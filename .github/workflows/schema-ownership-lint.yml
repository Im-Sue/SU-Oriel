name: schema-ownership-lint

on:
  pull_request:
    paths:
      - "server/prisma/**/*.prisma"
      - "server/src/**/*.ts"
      - "server/scripts/**/*.ts"
      - "references/schema-ownership-matrix.yaml"

jobs:
  schema-ownership-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter su-oriel-server lint:schema-ownership -- --check
